<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Interactive card details form</title>
</head>
<body>

<div class="container">

  <div class="left">
    <div>
      <div class="front">
        <div class="fr">
          <img src="images/card-logo.svg" alt="">      
        </div>
        <h1 class="mainnums">0000 0000 0000 0000</h1>
        <div class="smallnums">
          <h1 class="sidenums">JANE APPLESEED</h1>
          <h1 class="mininums">00/00</h1>        
        </div>
        <img src="images/bg-card-front.png" alt="">      
      </div>
    </div>
    <div class="back">
      <img src="images/bg-card-back.png" alt=""> 
      <h1 class="verysmallnums">000</h1>       
    </div>
  </div>

    <div class="right">
      <img src="images/icon-complete.svg" alt="">
      <h1>THANK YOU!</h1>
      <p>We've added your card details</p>
      <button>Continue</button>
    </div>
</div>

</body>
</html>
