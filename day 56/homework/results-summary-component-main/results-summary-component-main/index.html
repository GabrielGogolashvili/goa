<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="main">
    <div class="result">
      <h3 id="yresult">Your Result</h3>

      <div class="points">
        <h1>76</h1>
        <p>of 100</p>
      </div>
      <h2>Great</h2>
      <p class="p1">You scored higher than 65% of the people who taken these tests.</p>
    </div>

    <div class="sum">
      <h3>Summary</h3>
      <div class="divs" id="reaction">
        <img src="./assets/images/icon-reaction.svg" alt="">
        <p class="p2">Reaction</p>
        <p class="p3"><b>80</b> / 100</p>
      </div>

      <div class="divs" id="memory">
        <img src="./assets/images/icon-memory.svg" alt="">
        <p class="p2">Memory</p>
        <p class="p3"><b>92</b> / 100</p>
      </div>

      <div class="divs" id="verbal">
        <img src="./assets/images/icon-verbal.svg" alt="">
        <p class="p2">Verbal</p>
        <p class="p3"><b>61</b> / 100</p>
      </div>

      <div class="divs" id="visual">
        <img src="./assets/images/icon-visual.svg" alt="">
        <p class="p2">Visual</p>
        <p class="p3"><b>73</b> / 100</p>
      </div>
      <button>Continue</button>
    </div>
  </div>
</body>
</html>
